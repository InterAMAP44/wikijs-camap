<h1>Notifications Administrateur ou coordinateur</h1>

<h2>Notification à la fermeture des commandes</h2>
<p>Le coordinateur ne reçoit la notification de la fermeture d'une commande que s'il a coché l'option dans:<br><mark class="pen-red"><strong>CATALOGUE &gt; GÉRER &gt; MODIFIER CATALOGUE</strong></mark></p>
